<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestion des Tâches</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Liste des tâches</h2>



    <!-- Formulaire ajout -->
    <div class="card mb-4">
        <div class="card-header">
            Ajouter une tâche
        </div>

        <div class="card-body">

            <form th:action="@{/tasks/add}" th:object="${task}" method="post">

                <div class="mb-3">
                    <label class="form-label">Titre</label>
                    <input type="text"
                           th:field="*{title}"
                           class="form-control"
                           placeholder="Titre de la tâche">
                    <div class="text-danger"
                         th:if="${#fields.hasErrors('title')}"
                         th:errors="*{title}">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}"
                              class="form-control"
                              placeholder="Description"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                    Ajouter
                </button>

            </form>

        </div>
    </div>

    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>


    <!-- Tableau des tâches -->

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="task : ${tasks}">

            <td th:text="${task.id}"></td>

            <td th:text="${task.title}"></td>

            <td th:text="${task.description}"></td>

            <td>
                <span th:if="${task.status == 'EN_COURS'}"
                      class="badge bg-warning">
                    En cours
                </span>

                <span th:if="${task.status == 'TERMINE'}"
                      class="badge bg-success">
                    Terminé
                </span>
            </td>

            <td>

                <a th:href="@{/tasks/edit/{id}(id=${task.id})}"
                   class="btn btn-warning btn-sm">
                    Modifier
                </a>

                <a th:href="@{/tasks/complete/{id}(id=${task.id})}"
                   class="btn btn-success btn-sm">
                    Terminer
                </a>

                <a th:href="@{/tasks/delete/{id}(id=${task.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Voulez-vous vraiment supprimer cette tâche ?')">
                    Supprimer
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
